<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="#0f172a"/>
  
  <!-- 大脑轮廓 - 主形状 -->
  <g transform="translate(256, 256)">
    <!-- 外圈网络节点 -->
    <circle cx="0" cy="-120" r="12" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="104" cy="-60" r="10" fill="#2563eb" filter="url(#glow)"/>
    <circle cx="104" cy="60" r="10" fill="#2563eb" filter="url(#glow)"/>
    <circle cx="0" cy="120" r="12" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="-104" cy="60" r="10" fill="#2563eb" filter="url(#glow)"/>
    <circle cx="-104" cy="-60" r="10" fill="#2563eb" filter="url(#glow)"/>
    
    <!-- 网络连接线 -->
    <g stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.6">
      <line x1="0" y1="-120" x2="104" y2="-60"/>
      <line x1="104" y1="-60" x2="104" y2="60"/>
      <line x1="104" y1="60" x2="0" y2="120"/>
      <line x1="0" y1="120" x2="-104" y2="60"/>
      <line x1="-104" y1="60" x2="-104" y2="-60"/>
      <line x1="-104" y1="-60" x2="0" y2="-120"/>
    </g>
    
    <!-- 中心大脑图标 -->
    <g fill="url(#glowGradient)" filter="url(#glow)">
      <!-- 左半球 -->
      <path d="M-50,0 
               C-50,-40 -30,-60 0,-60
               C-15,-50 -25,-30 -25,0
               C-25,30 -15,50 0,60
               C-30,60 -50,40 -50,0Z" 
            opacity="0.9"/>
      <!-- 右半球 -->
      <path d="M50,0 
               C50,-40 30,-60 0,-60
               C15,-50 25,-30 25,0
               C25,30 15,50 0,60
               C30,60 50,40 50,0Z" 
            opacity="0.9"/>
      <!-- 中间分隔 -->
      <line x1="0" y1="-50" x2="0" y2="50" stroke="#0f172a" stroke-width="4"/>
    </g>
    
    <!-- 内部电路纹理 -->
    <g stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.5">
      <path d="M-30,-20 L-10,-20 L-10,0 L10,0 L10,20 L30,20"/>
      <path d="M-30,20 L-10,20"/>
      <path d="M10,-20 L30,-20"/>
      <circle cx="-30" cy="-20" r="3" fill="#06b6d4"/>
      <circle cx="30" cy="20" r="3" fill="#06b6d4"/>
      <circle cx="-30" cy="20" r="3" fill="#06b6d4"/>
      <circle cx="30" cy="-20" r="3" fill="#06b6d4"/>
    </g>
    
    <!-- 核心发光点 -->
    <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#glow)"/>
  </g>
  
  <!-- 记忆脉冲线条 -->
  <g stroke="url(#mainGradient)" stroke-width="1" fill="none" opacity="0.3">
    <circle cx="256" cy="256" r="180" stroke-dasharray="20,10"/>
    <circle cx="256" cy="256" r="200" stroke-dasharray="15,15"/>
  </g>
</svg>