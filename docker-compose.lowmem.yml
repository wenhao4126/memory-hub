# 低内存优化配置（适用于 2 核 2G 服务器）
# 使用方法：docker compose -f docker-compose.lowmem.yml up -d

version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: memory-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-memory_hub}
      POSTGRES_USER: ${DB_USER:-memory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-memory_user} -d ${DB_NAME:-memory_hub}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - memory-hub-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memory-hub-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-memory_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-memory_hub}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - memory-hub-network

volumes:
  postgres_data:
    driver: local

networks:
  memory-hub-network:
    driver: bridge